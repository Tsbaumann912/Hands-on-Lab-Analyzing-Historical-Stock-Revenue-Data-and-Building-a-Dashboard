    contract_multiplier: 10000.0
    tick_size: 0.001
    tick_value: 10.00
    commission_per_contract: 2.25
    synthetic_start_price: 3.0
  SI:
    name: Silver
    yfinance_ticker: SI=F
    contract_multiplier: 5000.0
    tick_size: 0.005
    tick_value: 25.00
    commission_per_contract: 2.25
    synthetic_start_price: 22.0
  ZN:
    name: 10-Year T-Note
    yfinance_ticker: ZN=F
    contract_multiplier: 1000.0
    tick_size: 0.015625
    tick_value: 15.625
    commission_per_contract: 2.25
    synthetic_start_price: 110.0
  ZB:
    name: 30-Year T-Bond
    yfinance_ticker: ZB=F
    contract_multiplier: 1000.0
    tick_size: 0.03125
    tick_value: 31.25
    commission_per_contract: 2.25
    synthetic_start_price: 145.0

market_intelligence:
  history_start: "2000-01-01"
  cache_ttl_seconds: 300
  news_limit: 25
  assets:
    - symbol: ES
      label: E-mini S&P 500
      yfinance_ticker: ES=F
      color: "#0071e3"
    - symbol: NQ
      label: Nasdaq-100
      yfinance_ticker: NQ=F
      color: "#af52de"
    - symbol: CL
      label: Crude Oil (WTI)
      yfinance_ticker: CL=F
      color: "#ff3b30"
    - symbol: GC
      label: Gold
      yfinance_ticker: GC=F
      color: "#ff9f0a"
    - symbol: ZN
      label: 10-Year T-Note
      yfinance_ticker: ZN=F
